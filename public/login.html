<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log in - Social Network</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h1>Log in</h1>
        <p class="subtitle">Sign in to your Social Network account.</p>

        <div class="card" style="background:#f8fafc;border-style:dashed;margin-bottom:1rem;padding:1rem">
          <p style="margin:0 0 0.5rem;font-weight:600;font-size:0.9rem">Demo accounts</p>
          <p class="post-meta" style="margin:0">
            <strong>test.ayse@demo.com</strong> or <strong>test.can@demo.com</strong> — password123<br />
            (No data yet? Run <code>npm run demo:seed</code>)
          </p>
          <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.75rem">
            <button type="button" class="btn btn-secondary btn-sm" style="width:auto" id="fillAyse">Ayşe</button>
            <button type="button" class="btn btn-secondary btn-sm" style="width:auto" id="fillCan">Can</button>
          </div>
        </div>

        <div id="alert" class="alert hidden"></div>

        <form id="loginForm">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required />

          <label for="password">Password</label>
          <input id="password" name="password" type="password" required />

          <button type="submit" class="btn btn-primary">Log in</button>
        </form>

        <p style="margin-top: 1rem; text-align: center">
          Don't have an account? <a href="/register.html">Sign up</a>
        </p>
      </div>
    </div>

    <script src="/js/api.js"></script>
    <script>
      if (getToken()) {
        window.location.href = '/feed.html';
      }

      const form = document.getElementById('loginForm');
      const alertBox = document.getElementById('alert');

      document.getElementById('fillAyse').onclick = () => {
        form.email.value = 'test.ayse@demo.com';
        form.password.value = 'password123';
      };
      document.getElementById('fillCan').onclick = () => {
        form.email.value = 'test.can@demo.com';
        form.password.value = 'password123';
      };

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        try {
          const data = await api('/api/login', {
            method: 'POST',
            body: JSON.stringify({
              email: form.email.value.trim(),
              password: form.password.value,
            }),
          });
          setToken(data.token);
          setUser(data.user);
          window.location.href = '/feed.html';
        } catch (err) {
          alertBox.textContent = err.message;
          alertBox.className = 'alert alert-error';
          alertBox.classList.remove('hidden');
        }
      });
    </script>
  </body>
</html>
